<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Agent Game Lab - 만들기</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="creator-shell">
      <header class="creator-topbar">
        <div class="brand-block">
          <div class="brand-mark">AG</div>
          <div>
            <h1>AI 게임 만들기</h1>
            <p>AI 질문에 답하면서 나만의 러닝 게임을 먼저 정합니다.</p>
          </div>
        </div>
        <a class="text-link" href="./play.html">작업실 바로가기</a>
      </header>

      <main class="creator-main">
        <section class="conversation-card" aria-label="게임 만들기 대화">
          <div class="progress-row">
            <div>
              <span id="stepLabel" class="step-label">1 / 5</span>
              <h2 id="questionTitle">캐릭터는 어떤 모습이면 좋을까요?</h2>
            </div>
            <div id="stepPills" class="step-pills" aria-label="진행 단계"></div>
          </div>

          <div id="agentBubble" class="agent-bubble">
            예시를 고르거나 직접 적어도 됩니다. 없는 답을 적으면 AI가 게임에 맞는 모양으로 바꿔줄게요.
          </div>

          <div id="choiceGrid" class="choice-grid" aria-label="선택지"></div>

          <form id="creatorForm" class="creator-form">
            <label for="customAnswer">직접 쓰기</label>
            <div class="creator-input-row">
              <input id="customAnswer" type="text" autocomplete="off" placeholder="예: 소, 화산, 바나나 껍질" />
              <button class="primary-button" type="submit">답하기</button>
            </div>
          </form>

          <div class="creator-actions">
            <button id="backStepBtn" class="ghost-button" type="button" disabled>이전</button>
            <button id="skipStepBtn" class="ghost-button" type="button">추천값 사용</button>
          </div>
        </section>

        <aside class="draft-card" aria-label="지금까지 정한 것">
          <div class="panel-heading">
            <div>
              <h2>지금까지 정한 것</h2>
              <p>답변할 때마다 게임 설정이 채워집니다.</p>
            </div>
          </div>
          <div id="draftSummary" class="draft-summary"></div>
          <div id="finalPanel" class="final-panel hidden">
            <h2>게임 설정이 완성됐어요</h2>
            <p>아래 설정으로 러닝 게임 작업실을 열 수 있습니다.</p>
            <button id="createGameBtn" class="primary-button" type="button">게임 만들기</button>
          </div>
        </aside>
      </main>
    </div>

    <script src="./creator.js"></script>
  </body>
</html>
